name: "Security Analysis Config"

# Disable default queries and only run security-focused ones
disable-default-queries: false

# Enable additional query suites
queries:
  - security-and-quality
  
# Paths to analyze (include only source code)
paths:
  - "src"
  - "tests"

# Paths to ignore
paths-ignore:
  - "**/*.md"
  - "**/*.yml"
  - "**/*.yaml"
  - "**/docs/"
  - "**/scripts/"
  - "**/__pycache__/"
  - "**/.pytest_cache/"

# Python-specific configuration
languages:
  python:
    # Specify Python version for analysis
    version: "3.11"
    
    # Additional Python libraries to analyze
    # (CodeQL will auto-detect most dependencies)
    setup-python-dependencies: true