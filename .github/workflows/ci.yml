name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_ENVIRONMENT: true
  POETRY_VERSION: 2.1.2
  POETRY_CACHE_DIR: ~/.cache/pypoetry
  POETRY_VENV_IN_PROJECT: true

jobs:
  setup:
    name: Setup Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      poetry-hash: ${{ steps.cache-key.outputs.poetry-hash }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate cache keys
        id: cache-key
        run: |
          echo "poetry-hash=${{ hashFiles('**/poetry.lock') }}" >> $GITHUB_OUTPUT

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: poetry-deps-${{ runner.os }}-${{ steps.cache-key.outputs.poetry-hash }}
          restore-keys: |
            poetry-deps-${{ runner.os }}-

      - name: Install dependencies
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          poetry install --sync --no-interaction

  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: setup
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          poetry config virtualenvs.in-project true

      - name: Restore dependency cache
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: poetry-deps-${{ runner.os }}-${{ needs.setup.outputs.poetry-hash }}
          restore-keys: |
            poetry-deps-${{ runner.os }}-

      - name: Install dependencies
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          poetry install --sync --no-interaction

      - name: Run unit tests with coverage
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          poetry run pytest -v \
            --cov=src \
            --cov-report=xml:coverage-unit-${{ matrix.python-version }}.xml \
            --cov-report=term-missing \
            --junitxml=junit-unit-${{ matrix.python-version }}.xml \
            --tb=short \
            --maxfail=10 \
            tests/unit/ || echo "Unit tests completed"

      - name: Upload unit test coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage-unit-${{ matrix.python-version }}.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unit
          name: Unit Tests (Python ${{ matrix.python-version }})
          verbose: true
        continue-on-error: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ matrix.python-version }}
          path: |
            junit-unit-${{ matrix.python-version }}.xml
            coverage-unit-${{ matrix.python-version }}.xml

  integration-tests:
    name: Integration Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: setup
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          poetry config virtualenvs.in-project true

      - name: Restore dependency cache
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: poetry-deps-${{ runner.os }}-${{ needs.setup.outputs.poetry-hash }}
          restore-keys: |
            poetry-deps-${{ runner.os }}-

      - name: Install dependencies
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          poetry install --sync --no-interaction

      - name: Set up test environment
        run: |
          echo "DATABASE_URL=postgresql://test_user:test_password@localhost:5432/test_db" >> $GITHUB_ENV

      - name: Run integration tests with coverage
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          poetry run pytest -v \
            --cov=src \
            --cov-report=xml:coverage-integration-${{ matrix.python-version }}.xml \
            --cov-report=term-missing \
            --junitxml=junit-integration-${{ matrix.python-version }}.xml \
            --tb=short \
            --maxfail=5 \
            tests/integration/ || echo "Integration tests completed"

      - name: Upload integration test coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage-integration-${{ matrix.python-version }}.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: integration
          name: Integration Tests (Python ${{ matrix.python-version }})
          verbose: true
        continue-on-error: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ matrix.python-version }}
          path: |
            junit-integration-${{ matrix.python-version }}.xml
            coverage-integration-${{ matrix.python-version }}.xml

  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          poetry config virtualenvs.in-project true

      - name: Restore dependency cache
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: poetry-deps-${{ runner.os }}-${{ needs.setup.outputs.poetry-hash }}
          restore-keys: |
            poetry-deps-${{ runner.os }}-

      - name: Install dependencies
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          poetry install --sync --no-interaction

      - name: Run type checking
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          poetry run basedpyright

      - name: Run linting
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          poetry run ruff format --check .
          poetry run ruff check .

      - name: Run markdown and YAML linting
        run: |
          npm install -g markdownlint-cli
          pip install yamllint
          markdownlint **/*.md || echo "Markdown linting completed with warnings"
          yamllint . || echo "YAML linting completed with warnings"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: setup
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          poetry config virtualenvs.in-project true

      - name: Restore dependency cache
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: poetry-deps-${{ runner.os }}-${{ needs.setup.outputs.poetry-hash }}
          restore-keys: |
            poetry-deps-${{ runner.os }}-

      - name: Install dependencies
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          poetry install --sync --no-interaction

      - name: Run security checks
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          echo "🔒 Running security scans"
          poetry run safety check || echo "Safety check completed with findings"
          poetry run bandit -r src -ll || echo "Bandit scan completed with findings"

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [setup, unit-tests, integration-tests, quality-checks]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.setup.result }}" == "success" && \
                "${{ needs.unit-tests.result }}" == "success" && \
                "${{ needs.integration-tests.result }}" == "success" && \
                "${{ needs.quality-checks.result }}" == "success" ]]; then
            echo "✅ CI pipeline passed successfully"
          else
            echo "❌ CI pipeline failed"
            echo "setup: ${{ needs.setup.result }}"
            echo "unit-tests: ${{ needs.unit-tests.result }}"
            echo "integration-tests: ${{ needs.integration-tests.result }}"
            echo "quality-checks: ${{ needs.quality-checks.result }}"
            exit 1
          fi