---
name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, type-check, and test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@1e862dfacbd1d6d858c55d9b792c756523627244  # v7.1.4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (locked)
        run: uv sync --frozen --dev

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: BasedPyright type check
        run: uv run basedpyright

      # Phase 1 placeholder test suite has no production source to cover yet;
      # threshold is 0 so the gate does not block while real tests are seeded
      # in later phases. Raise this once the pp_security_master package gains
      # actual code.
      - name: Pytest with coverage
        run: >-
          uv run pytest
          --cov=src
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=0
