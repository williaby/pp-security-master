---
name: SonarCloud

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: SonarCloud analysis
    uses: ByronWilliamsCPA/.github/.github/workflows/sonarcloud.yml@e067cdb7294f6221dbde74ef1f4c3ca735eed570
    with:
      sonar-organization: williaby
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
