# Markdownlint configuration for pp-security-master
# Rule reference: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

default: true

# MD013: Line length -- disabled; long lines are acceptable in tables and code blocks
MD013: false

# MD033: Inline HTML -- disabled; some docs use HTML for badges
MD033: false

# MD041: First line should be a top-level heading -- disabled for non-doc files
MD041: false

# MD024: Duplicate headings -- only flag headings that are siblings (same
# level under the same parent); planning docs reuse names like "Description"
# and "Acceptance Criteria" under each numbered task/issue section.
MD024:
  siblings_only: true

# MD025: Multiple H1 headings -- docs with YAML front matter have a "title"
# field; set front_matter_title to '' so the title field does not count as H1.
MD025:
  front_matter_title: ''

# MD010: Hard tabs -- disabled in code blocks; Makefile recipe lines inside fenced
# blocks require literal tabs and must not be converted to spaces
MD010:
  code_blocks: false

# MD060: Table column style -- disabled; separator rows (`|---|---|`) have no spaces
# by convention but MD060 treats them as inconsistent with spaced header/data rows
MD060: false
