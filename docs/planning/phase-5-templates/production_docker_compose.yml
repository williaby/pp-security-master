version: '3.8'

# Production Docker Compose for Security-Master Enterprise Deployment
# Includes all services with enterprise-grade configuration, monitoring, and security

services:
  # PostgreSQL 17 - Primary database with production optimizations
  postgresql:
    image: postgres:17-alpine
    container_name: pp_security_db_prod
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Production optimizations
      POSTGRES_SHARED_BUFFERS: 2GB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 6GB
      POSTGRES_WORK_MEM: 256MB
      POSTGRES_MAINTENANCE_WORK_MEM: 1GB
      POSTGRES_MAX_CONNECTIONS: 200
      POSTGRES_CHECKPOINT_COMPLETION_TARGET: 0.9
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
      - pg_backups_prod:/var/lib/postgresql/backups
      - ./sql/init:/docker-entrypoint-initdb.d:ro
      - ./monitoring/postgresql/custom.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - database_net
    ports: []  # No external ports for security
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4'
        reservations:
          memory: 4G
          cpus: '2'

  # Redis 7 - High-performance caching with production configuration
  redis:
    image: redis:7-alpine
    container_name: pp_security_cache_prod
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data_prod:/data
      - ./monitoring/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - cache_net
    ports: []  # No external ports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '2'
        reservations:
          memory: 2G
          cpus: '1'

  # Security-Master API - Main application with PromptCraft integration
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
      target: production
    container_name: pp_security_api_prod
    environment:
      # Application settings
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=WARNING
      
      # Database configuration
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgresql:5432/${DATABASE_NAME}
      - DATABASE_POOL_SIZE=20
      - DATABASE_MAX_OVERFLOW=30
      
      # Cache configuration
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CACHE_TTL=3600
      
      # Authentication (PromptCraft integration)
      - CLOUDFLARE_AUDIENCE=${CLOUDFLARE_AUDIENCE}
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_TIMEOUT=28800  # 8 hours
      
      # External APIs
      - OPENFIGI_API_KEY=${OPENFIGI_API_KEY}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
      
      # Security
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - API_KEY_ENCRYPTION_KEY=${API_KEY_ENCRYPTION_KEY}
      
      # Monitoring
      - ENABLE_METRICS=true
      - METRICS_PORT=8001
      - ENABLE_AUDIT_LOGGING=true
      
      # Performance
      - WORKERS=4
      - MAX_REQUESTS=1000
      - MAX_REQUESTS_JITTER=50
      - TIMEOUT=300
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
      - backup_data:/app/backups:ro
      - ./security/policies:/app/security/policies:ro
    networks:
      - api_net
      - database_net
      - cache_net
      - monitoring_net
    ports:
      - "8000:8000"  # API endpoint (behind Cloudflare tunnel)
      - "8001:8001"  # Metrics endpoint (internal only)
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
        reservations:
          memory: 2G
          cpus: '2'

  # Background Worker - Async processing for classifications and imports
  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
      target: production
    container_name: pp_security_worker_prod
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgresql:5432/${DATABASE_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - OPENFIGI_API_KEY=${OPENFIGI_API_KEY}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
      - LOG_LEVEL=INFO
      - WORKER_CONCURRENCY=4
      - WORKER_PREFETCH_MULTIPLIER=4
      - ENABLE_METRICS=true
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    networks:
      - database_net
      - cache_net
      - monitoring_net
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "inspect", "ping", "-A", "src.security_master.worker.celery_app"]
      interval: 60s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 1G
          cpus: '1'

  # Prometheus - Metrics collection and alerting
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: pp_security_metrics_prod
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=90d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--web.listen-address=0.0.0.0:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring_net
      - api_net
    ports:
      - "9090:9090"  # Prometheus web UI (internal only)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 1G
          cpus: '1'

  # Grafana - Metrics visualization and dashboards
  grafana:
    image: grafana/grafana:10.1.1
    container_name: pp_security_dashboards_prod
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=${CLOUDFLARE_DOMAIN}
      - GF_SERVER_ROOT_URL=https://${CLOUDFLARE_DOMAIN}/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Cloudflare Access
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=${CLOUDFLARE_AUDIENCE}
      - GF_DATABASE_TYPE=postgres
      - GF_DATABASE_HOST=postgresql:5432
      - GF_DATABASE_NAME=${DATABASE_NAME}
      - GF_DATABASE_USER=${DATABASE_USER}
      - GF_DATABASE_PASSWORD=${DATABASE_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - monitoring_net
      - database_net
    ports:
      - "3000:3000"  # Grafana web UI (behind Cloudflare tunnel)
    depends_on:
      - prometheus
      - postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # AlertManager - Alert routing and notification
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: pp_security_alerts_prod
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=https://${CLOUDFLARE_DOMAIN}/alertmanager'
      - '--web.route-prefix=/'
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - monitoring_net
    ports:
      - "9093:9093"  # AlertManager web UI (internal only)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Exporter - Database metrics for Prometheus
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.13.2
    container_name: pp_security_db_exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgresql:5432/${DATABASE_NAME}?sslmode=disable
    networks:
      - monitoring_net
      - database_net
    ports:
      - "9187:9187"  # PostgreSQL metrics (internal only)
    depends_on:
      - postgresql
    restart: unless-stopped

  # Redis Exporter - Cache metrics for Prometheus
  redis_exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: pp_security_cache_exporter
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - monitoring_net
      - cache_net
    ports:
      - "9121:9121"  # Redis metrics (internal only)
    depends_on:
      - redis
    restart: unless-stopped

# Network configuration with isolation
networks:
  # API network - external access via Cloudflare tunnel
  api_net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: pp_api_bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1

  # Database network - internal only
  database_net:
    driver: bridge
    internal: true
    driver_opts:
      com.docker.network.bridge.name: pp_db_bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
          gateway: 172.21.0.1

  # Cache network - internal only  
  cache_net:
    driver: bridge
    internal: true
    driver_opts:
      com.docker.network.bridge.name: pp_cache_bridge
    ipam:
      config:
        - subnet: 172.22.0.0/24
          gateway: 172.22.0.1

  # Monitoring network - internal only
  monitoring_net:
    driver: bridge
    internal: true
    driver_opts:
      com.docker.network.bridge.name: pp_monitor_bridge
    ipam:
      config:
        - subnet: 172.23.0.0/24
          gateway: 172.23.0.1

# Persistent volume configuration
volumes:
  # PostgreSQL data - high performance storage
  pg_data_prod:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/cache/appdata/pp-security-prod/postgresql/data

  # PostgreSQL backups - long-term storage
  pg_backups_prod:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/user/pp-security-prod/backups/postgresql

  # Redis data - high performance storage
  redis_data_prod:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/cache/appdata/pp-security-prod/redis

  # Application data - mixed storage
  app_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/user/pp-security-prod/data

  # Application logs - long-term storage
  app_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/user/pp-security-prod/logs

  # Backup data - long-term storage
  backup_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/user/pp-security-prod/backups

  # Prometheus metrics data
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/cache/appdata/pp-security-prod/prometheus

  # Grafana data
  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/cache/appdata/pp-security-prod/grafana

  # AlertManager data
  alertmanager_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/cache/appdata/pp-security-prod/alertmanager

# Production deployment metadata
x-common-variables:
  logging: &default-logging
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

  healthcheck: &default-healthcheck
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 30s

  restart_policy: &default-restart
    restart: unless-stopped